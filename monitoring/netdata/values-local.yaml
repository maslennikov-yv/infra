image:
  registry: localhost:32000
  repository: netdata/netdata
  tag: v2.10.3

# single-node coverage by design — см. netdata/values.yaml для пояснения.
replicaCount: 1

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: netdata.local
      paths:
        - /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
