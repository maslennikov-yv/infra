image:
  registry: localhost:32000
  repository: netdata/netdata
  tag: v2.10.3

# single-node coverage by design — см. netdata/values.yaml для пояснения.
replicaCount: 1

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: netdata.prod.local
      paths:
        - /

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi
