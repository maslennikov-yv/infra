image:
  registry: localhost:32000
  repository: netdata/netdata
  tag: v2.10.3

# single-node coverage by design — см. netdata/values.yaml для пояснения.
replicaCount: 1

ingress:
  enabled: true
  className: nginx
  # Basic-auth: Secret netdata-basic-auth/monitoring создаётся целью
  # `make -C monitoring/netdata secrets-init` (вызывается из корневого `make up`
  # и из netdata-`install`/`upgrade`). Креды: `make -C monitoring/netdata show-creds`.
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: netdata-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Netdata (prod)"
  hosts:
    - host: netdata.prod.local
      paths:
        - /

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi
