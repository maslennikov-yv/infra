# Redis standalone + local microk8s registry
global:
  security:
    allowInsecureImages: true

architecture: standalone

auth:
  enabled: true
  existingSecret: redis
  existingSecretPasswordKey: redis-password
  acl:
    enabled: true

image:
  registry: localhost:32000
  repository: bitnami/redis
  tag: "8.4.0"

sentinel:
  enabled: false
  image:
    registry: localhost:32000
    repository: bitnami/redis-sentinel
    tag: "8.4.0"

metrics:
  enabled: true
  image:
    registry: localhost:32000
    repository: bitnami/redis-exporter
    tag: "1.80.1"

volumePermissions:
  enabled: false
  image:
    registry: localhost:32000
    repository: bitnami/os-shell
    tag: "12-debian-12-r51"

kubectl:
  image:
    registry: localhost:32000
    repository: bitnami/kubectl
    tag: "1.35.0"

# Light prod-профиль: рассчитан на ~рабочий набор < 256Mi.
# Если нагрузка вырастет — пересмотреть resources.limits.memory и persistence.size
# (изменение PVC StatefulSet — через make redis-recreate-prep, см. redis/BACKUP.md).
master:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 4Gi
    storageClass: ""

# Синхронизировать с redis/redis/values.yaml commonConfiguration при смене модулей/AOF.
# Логические БД для REDIS_DB в app-redis Secret (см. docs/pg-app.md): в реестре закрепляйте с 1, 0 — фолбэк; дефолт Redis — 16.
commonConfiguration: |-
  databases 128
  # Enable ReJSON и Redisearch
  loadmodule /opt/bitnami/redis/lib/redis/modules/redisearch.so
  loadmodule /opt/bitnami/redis/lib/redis/modules/rejson.so
  # Enable AOF https://redis.io/topics/persistence#append-only-file
  appendonly yes
  # Disable RDB persistence, AOF persistence already enabled.
  save ""
