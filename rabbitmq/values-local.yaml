global:
  security:
    allowInsecureImages: true

auth:
  username: "admin"
  existingPasswordSecret: rabbitmq
  existingErlangSecret: rabbitmq

image:
  registry: localhost:32000
  repository: bitnami/rabbitmq
  tag: "4.1.3-debian-12-r1"

# Lightweight local-профиль: минимальные limits для dev-машины.
# Erlang VM требует ~256Mi heap, ниже не стартует.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 512Mi
persistence:
  enabled: true
  size: 4Gi
  storageClass: ""

volumePermissions:
  enabled: false
  image:
    registry: localhost:32000
    repository: bitnami/os-shell
    tag: "12-debian-12-r50"

ingress:
  enabled: false
  ingressClassName: nginx
  hostname: rabbitmq.local
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  tls: false

# Prometheus метрики через встроенный rabbitmq_prometheus plugin (port 15692, /metrics).
# Bitnami chart автоматически добавляет podAnnotations prometheus.io/scrape:"true".
# Дополнительный exporter-образ не требуется.
metrics:
  enabled: true
