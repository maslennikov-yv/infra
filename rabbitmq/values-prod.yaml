global:
  security:
    allowInsecureImages: true

auth:
  username: "admin"
  # Important for upgrades/diff: reuse existing secret created by Makefile.
  existingPasswordSecret: rabbitmq
  existingErlangSecret: rabbitmq

image:
  registry: localhost:32000
  repository: bitnami/rabbitmq
  tag: "4.1.3-debian-12-r1"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Standard prod-профиль: PVC 8Gi (durable queues + mnesia metadata).
# При росте durable queue depth — пересмотреть размер.
# Изменение persistence.size у StatefulSet — через make rabbitmq-recreate-prep
# (см. rabbitmq/BACKUP.md: backup-defs + recreate + restore-defs + apps-apply;
# сообщения в durable queues при этом теряются).
persistence:
  enabled: true
  size: 8Gi
  storageClass: ""

volumePermissions:
  enabled: false
  image:
    registry: localhost:32000
    repository: bitnami/os-shell
    tag: "12-debian-12-r50"

ingress:
  enabled: false
  ingressClassName: nginx
  hostname: rabbitmq.local
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  tls: false

# Prometheus метрики через встроенный rabbitmq_prometheus plugin (port 15692, /metrics).
# Bitnami chart автоматически добавляет podAnnotations prometheus.io/scrape:"true".
# Дополнительный exporter-образ не требуется. Metrics-port 15692 не публикуется
# через ingress (выше enabled: false), так что доступен только in-cluster.
metrics:
  enabled: true

# NetworkPolicy: создаётся chart'ом, но allowExternal: true делает её
# фактически noop. Для жёсткой сегментации — см. docs/runbooks/network-policy.md.
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
