global:
  security:
    allowInsecureImages: true

auth:
  existingSecret: minio
  rootUserSecretKey: root-user
  rootPasswordSecretKey: root-password

image:
  registry: localhost:32000
  repository: bitnami/minio
  tag: "2025.7.23-debian-12-r3"

clientImage:
  registry: localhost:32000
  repository: bitnami/minio-client
  tag: "2025.7.21-debian-12-r2"

console:
  enabled: true
  image:
    registry: localhost:32000
    repository: bitnami/minio-object-browser
    tag: "2.0.2-debian-12-r3"
  # Do not expose Console publicly by default
  ingress:
    enabled: false

defaultInitContainers:
  volumePermissions:
    image:
      registry: localhost:32000
      repository: bitnami/os-shell
      tag: "12-debian-12-r50"

ingress:
  enabled: true
  ingressClassName: nginx
  # Placeholder. Реальный публичный hostname (под который выпущен TLS-сертификат
  # cert-manager) переопределите в minio/values-prod.local.yaml — этот файл
  # gitignored и не попадёт в публичный репозиторий. См. minio/README.md.
  hostname: s3.example.com
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    cert-manager.io/cluster-issuer: "letsencrypt"
  tls: true
  extraHosts: []
  extraTls: []

# Standard prod-профиль: standalone (single pod), 50Gi PVC, 512Mi-1Gi памяти.
# При росте нагрузки/объёма — пересмотреть resources.limits и persistence.size.
# Изменение persistence.size у StatefulSet — через make minio-recreate-prep
# (см. minio/BACKUP.md: backup-meta + apps-apply воссоздаст IAM/policies; объекты
# в bucket'ах требуют отдельного mc mirror или snapshot PV).
mode: standalone
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
persistence:
  enabled: true
  size: 50Gi
  storageClass: ""

# Prometheus метрики через встроенный MinIO endpoint. Дополнительный exporter не нужен.
# ⚠ В prod ingress включён → endpoint /minio/v2/metrics/cluster и /node будут
# доступны публично при prometheusAuthType: public. Используем jwt — scraper
# должен передавать Bearer-токен админа MinIO. Альтернатива: оставить public и
# заблокировать /minio/v2/metrics/ через nginx server-snippet annotation.
# См. https://min.io/docs/minio/linux/operations/monitoring/collect-minio-metrics-using-prometheus.html
metrics:
  enabled: true
  prometheusAuthType: jwt
