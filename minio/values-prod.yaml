global:
  security:
    allowInsecureImages: true

auth:
  existingSecret: minio
  rootUserSecretKey: root-user
  rootPasswordSecretKey: root-password

image:
  registry: localhost:32000
  repository: bitnami/minio
  tag: "2025.7.23-debian-12-r3"

clientImage:
  registry: localhost:32000
  repository: bitnami/minio-client
  tag: "2025.7.21-debian-12-r2"

console:
  enabled: true
  image:
    registry: localhost:32000
    repository: bitnami/minio-object-browser
    tag: "2.0.2-debian-12-r3"
  # Do not expose Console publicly by default
  ingress:
    enabled: false

defaultInitContainers:
  volumePermissions:
    image:
      registry: localhost:32000
      repository: bitnami/os-shell
      tag: "12-debian-12-r50"

ingress:
  enabled: true
  ingressClassName: nginx
  hostname: s3.natalya-maslennikova.ru
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    cert-manager.io/cluster-issuer: "letsencrypt"
  tls: true
  extraHosts: []
  extraTls: []
