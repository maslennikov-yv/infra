# Использование local registry (microk8s)
global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000
  repository: bitnami/postgresql
  tag: "18.0.0"

volumePermissions:
  image:
    registry: localhost:32000
    repository: bitnami/os-shell
    tag: "12-debian-12-r51"

metrics:
  image:
    registry: localhost:32000
    repository: bitnami/postgres-exporter
    tag: "0.18.1"

# Пароль superuser postgres хранится в Secret postgres/postgres-postgresql
# (создаётся корневой целью `make up` через openssl rand при первом запуске).
# Изоляция приложений — через `make pg-app-create` / apps-apply, не здесь.
auth:
  enablePostgresUser: true
  existingSecret: postgres-postgresql

architecture: standalone

primary:
  # architecture: standalone — primary.replicaCount должен быть 1, иначе
  # получим N независимых primary с собственными PVC за одним ClusterIP
  # (расщепление данных). Для HA — переходить на architecture: replication.
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  updateStrategy:
    type: RollingUpdate
  # NetworkPolicy: создаётся chart'ом, но allowExternal: true делает её
  # фактически noop (принимает соединения откуда угодно). Для жёсткой
  # сегментации — см. docs/runbooks/network-policy.md (allowExternal: false +
  # ingressNSMatchLabels: { infra-client: "true" } + label app namespaces).
  networkPolicy:
    enabled: true
    allowExternal: true
    allowExternalEgress: true

readReplicas:
  replicaCount: 0

