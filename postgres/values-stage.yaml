# Stage — PostgreSQL для MCP
global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000
  repository: bitnami/postgresql
  tag: "18.0.0"

volumePermissions:
  image:
    registry: localhost:32000
    repository: bitnami/os-shell
    tag: "12-debian-12-r51"

metrics:
  image:
    registry: localhost:32000
    repository: bitnami/postgres-exporter
    tag: "0.18.1"

# Пароль superuser postgres хранится в Secret postgres/postgres-postgresql
# (создаётся корневой целью `make up` через openssl rand при первом запуске).
# Изоляция приложений — через `make pg-app-create` / apps-apply, не здесь.
auth:
  enablePostgresUser: true
  existingSecret: postgres-postgresql

architecture: standalone

primary:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    # Не менять: размер PVC нельзя изменить у существующего StatefulSet (должен совпадать с уже созданным)
    size: 2Gi
    storageClass: ""
  updateStrategy:
    type: RollingUpdate

readReplicas:
  replicaCount: 0
