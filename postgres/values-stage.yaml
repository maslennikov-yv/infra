# Stage — PostgreSQL для MCP (77.246.158.37)
global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000
  repository: bitnami/postgresql
  tag: "18.0.0"

volumePermissions:
  image:
    registry: localhost:32000
    repository: bitnami/os-shell
    tag: "12-debian-12-r51"

metrics:
  image:
    registry: localhost:32000
    repository: bitnami/postgres-exporter
    tag: "0.18.1"

auth:
  enablePostgresUser: true
  postgresPassword: "postgres123"
  username: "app_user"
  password: "app_password"
  database: "app_db"

architecture: standalone

primary:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    # Не менять: размер PVC нельзя изменить у существующего StatefulSet (должен совпадать с уже созданным)
    size: 2Gi
    storageClass: ""
  updateStrategy:
    type: RollingUpdate

readReplicas:
  replicaCount: 0
