# Использование local registry (microk8s)
global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000
  repository: bitnami/postgresql
  tag: "18.0.0"

volumePermissions:
  image:
    registry: localhost:32000
    repository: bitnami/os-shell
    tag: "12-debian-12-r51"

metrics:
  image:
    registry: localhost:32000
    repository: bitnami/postgres-exporter
    tag: "0.18.1"

# Базовая аутентификация (пример; при необходимости замените на Secret)
auth:
  enablePostgresUser: true
  postgresPassword: "postgres123"
  username: "app_user"
  password: "app_password"
  database: "app_db"

architecture: standalone

primary:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  updateStrategy:
    type: RollingUpdate

readReplicas:
  replicaCount: 0

