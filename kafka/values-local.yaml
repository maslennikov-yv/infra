global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000

existingKraftSecret: kafka-kraft

listeners:
  client:
    protocol: SASL_PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT

sasl:
  enabledMechanisms: SCRAM-SHA-256
  interBrokerMechanism: SCRAM-SHA-256
  controllerMechanism: SCRAM-SHA-256
  # Important for upgrades: reuse the already generated passwords secret.
  # Without this, Bitnami chart may fail with: "PASSWORDS ERROR: You must provide your current passwords when upgrading".
  existingSecret: kafka-user-passwords
  client:
    users:
      - user1

overrideConfiguration:
  authorizer.class.name: org.apache.kafka.metadata.authorizer.StandardAuthorizer
  # controller listener is PLAINTEXT => principal can be ANONYMOUS for internal KRaft traffic
  super.users: User:user1;User:ANONYMOUS
  allow.everyone.if.no.acl.found: "false"

defaultInitContainers:
  volumePermissions:
    image:
      registry: localhost:32000
  autoDiscovery:
    image:
      registry: localhost:32000

metrics:
  jmx:
    image:
      registry: localhost:32000

# Lightweight local-профиль: 1 controller (без quorum-выборов), минимальные limits.
# JVM Kafka требует ~256Mi heap, ниже не стартует. Если make bootstrap делает первый
# запуск с chart-дефолтом replicaCount=3 (values-bootstrap.yaml не задаёт его),
# последующий upgrade на values-local скейлит обратно к 1.
controller:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 384Mi
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""

broker:
  persistence:
    enabled: false

