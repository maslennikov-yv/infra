global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000

existingKraftSecret: kafka-kraft

listeners:
  client:
    protocol: SASL_PLAINTEXT
  controller:
    # IMPORTANT: Keep controller listener PLAINTEXT to avoid a bootstrap chicken-egg.
    # KRaft quorum needs to come up before SCRAM users can be written to metadata.
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT

sasl:
  enabledMechanisms: SCRAM-SHA-256
  interBrokerMechanism: SCRAM-SHA-256
  controllerMechanism: SCRAM-SHA-256
  existingSecret: kafka-user-passwords
  client:
    users:
      - user1

overrideConfiguration:
  authorizer.class.name: org.apache.kafka.metadata.authorizer.StandardAuthorizer
  # controller listener is PLAINTEXT => principal can be ANONYMOUS for internal KRaft traffic
  super.users: User:user1;User:ANONYMOUS
  allow.everyone.if.no.acl.found: "false"

defaultInitContainers:
  volumePermissions:
    image:
      registry: localhost:32000
  autoDiscovery:
    image:
      registry: localhost:32000

metrics:
  jmx:
    image:
      registry: localhost:32000

# Standard prod-профиль: 3 controller-pod (KRaft quorum), 16Gi PVC, 1-2Gi heap-friendly.
# При росте топиков/throughput — пересмотреть resources.limits.memory и persistence.size.
# Изменение persistence.size у StatefulSet — через make kafka-recreate-prep + restore-meta-topics
# (см. kafka/BACKUP.md, сценарий C: новый PV, метаданные восстанавливаются из backup-meta).
controller:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 16Gi
    storageClass: ""

broker:
  persistence:
    enabled: false

