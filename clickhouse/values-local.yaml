global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000
  repository: bitnami/clickhouse
  tag: "25.7.5-debian-12-r0"

defaultInitContainers:
  volumePermissions:
    image:
      registry: localhost:32000
      repository: bitnami/os-shell
      tag: "12-debian-12-r51"

# Standalone
shards: 1
replicaCount: 1

keeper:
  enabled: false
  image:
    registry: localhost:32000
    repository: bitnami/clickhouse-keeper
    tag: "25.7.5-debian-12-r0"

service:
  type: ClusterIP
  perReplicaAccess: false

persistence:
  enabled: true
  size: 4Gi
  storageClass: ""

# Lightweight local-профиль: минимальные limits для dev-машины.
# ClickHouse JVM не использует, но всё равно требует ~256Mi для query parser/cache.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

# Пароль admin хранится в Secret clickhouse/clickhouse
# (создаётся корневой целью `make up` через openssl rand при первом запуске).
auth:
  username: admin
  existingSecret: clickhouse
  existingSecretKey: admin-password
