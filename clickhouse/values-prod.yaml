global:
  security:
    allowInsecureImages: true

image:
  registry: localhost:32000
  repository: bitnami/clickhouse
  tag: "25.7.5-debian-12-r0"

defaultInitContainers:
  volumePermissions:
    image:
      registry: localhost:32000
      repository: bitnami/os-shell
      tag: "12-debian-12-r51"

# Standalone
shards: 1
replicaCount: 1

keeper:
  enabled: false
  image:
    registry: localhost:32000
    repository: bitnami/clickhouse-keeper
    tag: "25.7.5-debian-12-r0"

service:
  type: ClusterIP
  perReplicaAccess: false

persistence:
  enabled: true
  size: 16Gi
  storageClass: ""

# Light prod-профиль: рассчитан на ~2GB heap для analytical queries.
# При росте объёма таблиц/нагрузки — пересмотреть resources.limits и persistence.size.
# Изменение persistence.size у StatefulSet — через make clickhouse-recreate-prep
# (см. clickhouse/BACKUP.md: backup → recreate-prep → restore schemas + apps-apply).
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Пароль admin хранится в Secret clickhouse/clickhouse
# (создаётся корневой целью `make up` через openssl rand при первом запуске).
auth:
  username: admin
  existingSecret: clickhouse
  existingSecretKey: admin-password

# Prometheus метрики через встроенный ClickHouse endpoint (port 8001, /metrics).
# Дополнительный exporter не нужен. podAnnotations включают auto-discovery в
# Prometheus/Netdata-go.d через стандартные prometheus.io/* аннотации.
# Endpoint доступен только in-cluster (8001 не публикуется через ingress).
metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8001"
    prometheus.io/path: "/metrics"

# NetworkPolicy: создаётся chart'ом, но allowExternal: true делает её
# фактически noop. Для жёсткой сегментации — см. docs/runbooks/network-policy.md.
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
